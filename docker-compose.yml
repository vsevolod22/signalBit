services:
  postgres:
    image: postgres:16-alpine
    container_name: signalbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-signalbit_cms}
      POSTGRES_USER: ${DATABASE_USERNAME:-signalbit}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - signalbit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-signalbit} -d ${DATABASE_NAME:-signalbit_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  signalbit_postgres_data:
